directories:
  output: release-legacy
  buildResources: build
appId: com.streammesh.app.legacy
productName: Stream Mesh Catalina
files:
  - filter:
      - dist/**/*
      - src/ui/assets/**/*
      - src/shared/assets/**/*
      - node_modules/aws-sdk/**/*
      - node_modules/express/**/*
      - '!node_modules/**/{test,spec,docs,doc,demo,example,examples,samples}/**/*'
      - '!node_modules/**/{README,readme,CHANGELOG,changelog,LICENSE,license}*'
      - '!node_modules/**/*.{d.ts,map}'
asarUnpack:
  - node_modules/aws-sdk/**/*
extraMetadata:
  main: dist/main.js
  type: commonjs
nodeGypRebuild: false
npmRebuild: false
beforeBuild: scripts/prepare-build.js
mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch: x64
  icon: src/icon.png
  minimumSystemVersion: 10.15.0
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: src/icon.png
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
publish: null
electronVersion: 22.3.27
